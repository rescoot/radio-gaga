# radio-gaga configuration - annotated example
#
# Only `scooter.identifier`, `scooter.token` and a reachable broker/redis are
# strictly required. Every other key has a sensible default (shown below as
# `# default: ...`); delete a key to fall back to its default.

scooter:
  identifier: VEHICLE-ID            # MQTT username / vehicle id (required)
  token: 64character_sha256_token   # MQTT password (required)
  # name: "My Scooter"              # optional friendly name

environment: production             # production | development (default: production)
                                    # `shell` command is only allowed in development

