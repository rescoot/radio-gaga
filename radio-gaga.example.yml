  keepalive: 30s                    # default: 30s

ntp:
  enabled: true                     # default: true
  server: pool.ntp.rescoot.org      # default: pool.ntp.rescoot.org

redis_url: redis://localhost:6379   # on-board Redis (default: redis://127.0.0.1:6379)

telemetry:
  # Periodic full-snapshot cadence, chosen by the vehicle's power state.
  intervals:
    driving: 30s            # default: 30s - keep this >= 30s to limit data volume
    standby: 5m             # default: 5m
    standby_no_battery: 8h  # default: 8h
    hibernate: 24h          # default: 24h

  # Change-driven flush deadlines: the upper bound on how long a changed field
  # waits before being published. Must be ordered immediate <= quick <= medium <= slow.
  # Lower = more responsive but more traffic. The defaults below are tuned to keep
  # the scooter from spamming the broker.
  priorities:
    immediate: 10s   # default: 10s - vehicle state, lock status, blinkers
    quick: 30s       # default: 30s - GPS, battery charge
    medium: 5m       # default: 5m  - most other fields
    slow: 1h         # default: 1h  - aux battery, CBB, BLE

  transmit_period: 5m       # default: 5m - how often buffered telemetry is drained

  # Offline buffering: persist telemetry when the broker is unreachable and
  # replay it once reconnected. The on-disk path is auto-detected (not configurable).
  buffer:
    enabled: true           # default: false
    max_size: 1000          # default: 1000 - max buffered records
    max_retries: 5          # default: 5
    retry_interval: 1m      # default: 1m

# Event detection and buffering (movement, alarm, faults, ...). The buffer path
# is auto-detected and cannot be set here.
events:
  enabled: true             # default: true
  max_retries: 10           # default: 10

# Per-command overrides. You only need to list a command to disable it or to
# tune its params - unlisted commands keep their defaults and stay enabled.
# ping and get_state can never be disabled.
commands:
  honk:
    disabled: false
    params:
      on_time: 100ms        # default: 100ms - horn pulse length for one honk
  locate:
    disabled: false
    params:
      honk_time: 40ms       # default: 40ms - length of each locate beep
      honk_interval: 80ms   # default: 80ms - gap between the two beeps in a pair
      interval: 4s          # default: 4s   - gap between the two beep pairs
  alarm:
    disabled: false
    params:
      # Nested (shown) or flat dotted keys (e.g. "hazards.flash: true") both work.
      hazards:
        flash: true       # default: true   - flash hazards during the alarm
      horn:
        honk: true        # default: true   - sound the horn during the alarm
        on_time: 400ms    # default: 400ms  - horn on duration per pulse
        off_time: 400ms   # default: 400ms  - horn off duration per pulse
  open_seatbox:
    disabled: false
  # Example: disable a command entirely
  # shell:
  #   disabled: true

# Telegram notifications (optional)
# Sends alerts directly to a Telegram chat via the Bot API.
# Create a bot via @BotFather, then get your chat_id by messaging the bot and
# calling https://api.telegram.org/bot<token>/getUpdates
# telegram:
#   enabled: true
#   bot_token: "YOUR_BOT_TOKEN"
#   chat_id: "YOUR_CHAT_ID"
#   rate_limit: 1s          # default: 1s  - minimum gap between messages
#   queue_size: 100         # default: 100
#   daily_limit: 0          # default: 0   - 0 = unlimited
#   events:                 # default: alarm/unauthorized_movement/battery_warning/temperature_warning enabled
#     alarm: true
#     unauthorized_movement: true
#     battery_warning: true
#     temperature_warning: true
#     state_change: false
#     connectivity: false
#     fault: false

# Configurable notification rules and channels (optional)
# Rules are evaluated on every Redis pub/sub change and can route to telegram, sms, or both.
# notifications:
#   rules:
#     # Alert when CB battery drops below 50% - sent to Telegram with a 30-min cooldown
#     - name: "cbb_low"
#       conditions:
#         - source: "cb-battery"    # Redis hash to watch
#           field: "charge"         # hash field to check
#           operator: "<"           # <, >, <=, >=, ==, !=
#           value: "50"
#       channels: [telegram]
#       cooldown: "30m"
#       message: "CB battery at {{cb-battery.charge}}%"  # optional, {{source.field}} placeholders
#
#     # Alert when the alarm triggers while parked (multi-condition AND logic)
#     - name: "alarm_while_parked"
#       conditions:
#         - source: "alarm"
#           field: "status"
#           operator: "=="
#           value: "triggered"
#         - source: "vehicle"
#           field: "state"
#           operator: "=="
#           value: "standby"
#       channels: [telegram, sms]
#
#     # Match a raw pub/sub message payload directly
#     - name: "some_pubsub_event"
#       conditions:
#         - source: "some-channel"
#           message: "=="           # == (exact) or contains (substring)
#           value: "triggered"
#       channels: [telegram]
#
#   # SMS via ModemManager (mmcli) - requires a cellular modem
#   sms:
#     enabled: false
#     phone_number: "+491234567890"
#     rate_limit: "30s"    # default: 30s - minimum gap between SMS messages
#     daily_limit: 20      # default: 20  - max messages per calendar day (0 = unlimited)
#     queue_size: 20       # default: 20

# unu-uplink reconfiguration (optional)
# If enabled, radio-gaga reconfigures mdb-uplink-service to use the same MQTT
# broker and CA certificate as radio-gaga, then restarts the service. Useful on
# stock unu firmware, since the defunct unu cloud config no longer works.
unu_uplink:
  enabled: false           # default: false
